# tof_eval — Gemini 336 전용 파라미터.
#
# eval_params.example.yaml 과 다른 점:
#   - input_topic: /camera/depth/points
#   - expected_point_count: 307200  (640×480)
#   - voxel_leaf_m: 0.05            (dense cloud 전처리 — 처리 시간 ≈ 1 ms/frame)
#
# 세션별로 scene 블록 / session_id / csv_output_dir 만 수정해서 사용.

tof_eval:
  ros__parameters:
    input_topic: /camera/depth/points

    scene:
      session_id: gemini336_matte_indoor_001
      sensor: GEMINI_336
      floor_material: matte_vinyl
      floor_color: light_grey
      ambient_light: indoor_led
      obstacle_surface: matte_cardboard
      notes: "실내 기본 조명, creek-window closed"
      tags: [""]

    ground_removal:
      ransac_distance_threshold: 0.02
      ransac_max_iterations: 100
      min_inlier_ratio: 0.3

    clustering:
      min_height_above_ground: 0.03
      max_height_above_ground: 2.0
      euclidean_tolerance: 0.05
      min_cluster_points: 3

    # Gemini 640×480 = 307200
    expected_point_count: 307200

    # dense cloud (≈315K pts) 를 voxel 5 cm 로 축소 → RANSAC/BFS ≈ 5K pts 입력
    voxel_leaf_m: 0.05

    density_distances_m: [0.3, 0.5, 1.0, 1.5, 2.0]
    density_slab_thickness_m: 0.2
    density_lateral_window_m: 2.0

    obstacle_ids: [cube_a, cube_b]

    obstacles:
      cube_a:
        expected_xyz: [1.0, 0.0, 0.05]
        size_xyz: [0.10, 0.10, 0.10]
        search_radius: 0.20

      cube_b:
        expected_xyz: [1.5, 0.3, 0.10]
        size_xyz: [0.20, 0.20, 0.20]
        search_radius: 0.25

    csv_output_dir: /tmp/tof_eval
